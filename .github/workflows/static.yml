# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate index.html
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import html
          import re

          root = Path('.')

          def is_hidden(path: Path) -> bool:
              return any(part.startswith('.') for part in path.parts)

          def title_for(path: Path) -> str:
              try:
                  text = path.read_text(encoding='utf-8', errors='ignore')
                  match = re.search(r'<title>(.*?)</title>', text, flags=re.IGNORECASE | re.DOTALL)
                  if match:
                      value = re.sub(r'\s+', ' ', match.group(1)).strip()
                      if value:
                          return value
              except Exception:
                  pass
              return path.stem.replace('-', ' ').replace('_', ' ').title()

          html_files = []
          for file_path in root.rglob('*.html'):
              rel = file_path.relative_to(root)
              if rel.name == 'index.html':
                  continue
              if is_hidden(rel):
                  continue
              html_files.append(rel)

          html_files.sort(key=lambda p: str(p).lower())

          tree = {"_files": [], "_dirs": {}}
          for rel in html_files:
              node = tree
              for folder in rel.parts[:-1]:
                  node = node["_dirs"].setdefault(folder, {"_files": [], "_dirs": {}})

              href = str(rel).replace('\\', '/')
              title = title_for(root / rel)
              node["_files"].append((rel.name, href, title))

          def render_tree(node, indent='      '):
              lines = []

              for _name, href, title in sorted(node["_files"], key=lambda item: item[1].lower()):
                  lines.append(
                      f'{indent}<li class="file"><a href="{html.escape(href, quote=True)}">{html.escape(title)}</a></li>'
                  )

              for dirname, child in sorted(node["_dirs"].items(), key=lambda item: item[0].lower()):
                  lines.append(f'{indent}<li class="folder"><span class="folder-name">{html.escape(dirname)}/</span>')
                  lines.append(f'{indent}  <ul>')
                  lines.extend(render_tree(child, indent + '    '))
                  lines.append(f'{indent}  </ul>')
                  lines.append(f'{indent}</li>')

              return lines

          tree_lines = render_tree(tree)
          listing = '\n'.join(tree_lines) if tree_lines else '      <li>No presentations found.</li>'
          generated_at_dt = datetime.now(timezone.utc)
          generated_at = generated_at_dt.strftime('%Y-%m-%d %H:%M:%S UTC')
          generated_at_iso = generated_at_dt.isoformat().replace('+00:00', 'Z')

          content = f'''<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Presentation Index</title>
            <style>
              :root {{
                color-scheme: dark;
                --bg: #0b1220;
                --card: #111a2e;
                --text: #e5ecff;
                --muted: #9bb0d8;
                --accent: #67d4ff;
                --border: #223050;
              }}
              * {{ box-sizing: border-box; }}
              body {{
                margin: 0;
                font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
                background: var(--bg);
                color: var(--text);
                padding: 32px 18px;
              }}
              .wrap {{
                max-width: 920px;
                margin: 0 auto;
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 24px;
              }}
              h1 {{ margin: 0 0 8px; font-size: 1.7rem; }}
              p {{ margin: 0 0 18px; color: var(--muted); }}
              .generated {{ margin: 0 0 18px; color: var(--muted); font-size: 0.92rem; }}
              ul {{ margin: 0; }}
              .tree, .tree ul {{ list-style: none; padding-left: 18px; }}
              .tree > li {{ margin: 8px 0; }}
              .tree ul {{ margin-top: 6px; border-left: 1px solid var(--border); }}
              li {{ line-height: 1.45; }}
              a {{ color: var(--accent); text-decoration: none; }}
              a:hover {{ text-decoration: underline; }}
              .folder-name {{ color: var(--muted); font-weight: 600; }}
            </style>
          </head>
          <body>
            <main class="wrap">
              <h1>Presentation Index</h1>
              <p>Auto-generated list of HTML presentations in this repository.</p>
              <p class="generated" id="generated-time" data-generated-utc="{html.escape(generated_at_iso)}">Generated: {html.escape(generated_at)}</p>
                <ul class="tree">
          {listing}
              </ul>
            </main>
            <script>
              (() => {{
                const el = document.getElementById('generated-time');
                if (!el) return;
                const iso = el.getAttribute('data-generated-utc');
                if (!iso) return;
                const dt = new Date(iso);
                if (Number.isNaN(dt.getTime())) return;
                const local = dt.toLocaleString();
                el.textContent += ' (' + local + ' local)';
              }})();
            </script>
          </body>
          </html>
          '''

          root.joinpath('index.html').write_text(content + '\n', encoding='utf-8')
          print(f'Generated index.html with {len(html_files)} link(s).')
          PY
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
