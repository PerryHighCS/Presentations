# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "CODEOWNERS"
      - ".github/CODEOWNERS"
      - ".agent/**"
      - ".claude/**"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Pre-enable submodule checkout for upcoming SyncDeck-Reveal split.
          # If no submodules exist yet, this is a no-op.
          submodules: recursive
      - name: Stage publishable site
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import shutil

          root = Path('.').resolve()
          site = root / '_site'
          manifest_name = '.pages-manifest'

          default_dir_excludes = {
              '.git',
              '.github',
              '.devcontainer',
              '.agent',
              '.claude',
              '_site',
              'node_modules',
          }
          default_file_excludes = {
              '.gitignore',
              '.gitattributes',
              '.gitmodules',
              '.editorconfig',
              'CODEOWNERS',
          }

          if site.exists():
              shutil.rmtree(site)
          site.mkdir()

          rules = []
          for manifest in root.rglob(manifest_name):
              manifest_base = manifest.parent.relative_to(root).as_posix()
              for line_number, raw_line in enumerate(manifest.read_text(encoding='utf-8').splitlines(), start=1):
                  line = raw_line.strip()
                  if not line or line.startswith('#'):
                      continue
                  if not line.startswith('exclude '):
                      raise SystemExit(
                          f'Unsupported directive in {manifest}: line {line_number}: {raw_line}'
                      )
                  value = line[len('exclude '):].strip()
                  if not value:
                      raise SystemExit(f'Empty exclude rule in {manifest}: line {line_number}')
                  is_dir = value.endswith('/')
                  normalized = value[:-1] if is_dir else value
                  if normalized.startswith('./'):
                      normalized = normalized[2:]
                  if not normalized:
                      raise SystemExit(f'Invalid exclude rule in {manifest}: line {line_number}')
                  joined = Path(manifest_base, normalized) if manifest_base != '.' else Path(normalized)
                  rules.append({
                      'path': joined.as_posix(),
                      'is_dir': is_dir,
                      'manifest': manifest.relative_to(root).as_posix(),
                  })

          def is_excluded(rel_path: Path, is_dir: bool) -> bool:
              rel_posix = rel_path.as_posix()
              parts = rel_path.parts

              if any(part in default_dir_excludes for part in parts):
                  return True
              if rel_path.name in default_file_excludes:
                  return True
              if rel_path.name == manifest_name:
                  return True

              for rule in rules:
                  rule_path = rule['path']
                  if rule['is_dir']:
                      if rel_posix == rule_path or rel_posix.startswith(rule_path + '/'):
                          return True
                  elif rel_posix == rule_path:
                      return True

              return False

          copied_files = 0
          for current_root, dirs, files in os.walk(root):
              current_path = Path(current_root)
              rel_dir = current_path.relative_to(root)

              kept_dirs = []
              for directory in dirs:
                  rel_child = rel_dir / directory if rel_dir != Path('.') else Path(directory)
                  if is_excluded(rel_child, is_dir=True):
                      continue
                  kept_dirs.append(directory)
              dirs[:] = kept_dirs

              dest_dir = site / rel_dir if rel_dir != Path('.') else site
              dest_dir.mkdir(parents=True, exist_ok=True)

              for file_name in files:
                  rel_file = rel_dir / file_name if rel_dir != Path('.') else Path(file_name)
                  if is_excluded(rel_file, is_dir=False):
                      continue
                  source = root / rel_file
                  dest = site / rel_file
                  dest.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(source, dest)
                  copied_files += 1

          print(f'Staged {copied_files} file(s) into {site.relative_to(root)}.')
          print(f'Applied {len(rules)} manifest rule(s).')
          PY
            - name: List staged site files
                run: |
                    echo "Files that will be published from _site:"
                    if [ -d _site ]; then
                        find _site -type f -printf '%P\n' | sort
                        echo
                        echo "Total files: $(find _site -type f | wc -l)"
                    else
                        echo "_site directory was not created."
                        exit 1
                    fi
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate index.html
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import html
          import re

          root = Path('_site')

          def is_hidden(path: Path) -> bool:
              return any(part.startswith('.') for part in path.parts)

          def title_for(path: Path) -> str:
              try:
                  text = path.read_text(encoding='utf-8', errors='ignore')
                  match = re.search(r'<title>(.*?)</title>', text, flags=re.IGNORECASE | re.DOTALL)
                  if match:
                      value = re.sub(r'\s+', ' ', match.group(1)).strip()
                      if value:
                          return value
              except Exception:
                  pass
              return path.stem.replace('-', ' ').replace('_', ' ').title()

          html_files = []
          for file_path in root.rglob('*.html'):
              rel = file_path.relative_to(root)
              if rel.name == 'index.html':
                  continue
              if is_hidden(rel):
                  continue
              html_files.append(rel)

          html_files.sort(key=lambda p: str(p).lower())

          PAGE_STYLE = '''
              :root {
                color-scheme: dark;
                --bg: #0b1220;
                --card: #111a2e;
                --text: #e5ecff;
                --muted: #9bb0d8;
                --accent: #67d4ff;
                --border: #223050;
              }
              * { box-sizing: border-box; }
              body {
                margin: 0;
                font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
                background: var(--bg);
                color: var(--text);
                padding: 32px 18px;
              }
              .wrap {
                max-width: 920px;
                margin: 0 auto;
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 24px;
              }
              h1 { margin: 0 0 8px; font-size: 1.7rem; }
              p { margin: 0 0 18px; color: var(--muted); }
              .generated { margin: 0 0 18px; color: var(--muted); font-size: 0.92rem; }
              .back { margin: 0 0 18px; font-size: 0.92rem; }
              .back a { color: var(--muted); }
              ul { margin: 0; }
              .tree, .tree ul { list-style: none; padding-left: 18px; }
              .tree > li { margin: 8px 0; }
              .tree ul { margin-top: 6px; border-left: 1px solid var(--border); }
              li { line-height: 1.45; }
              a { color: var(--accent); text-decoration: none; }
              a:hover { text-decoration: underline; }
              .folder-name { color: var(--muted); font-weight: 600; }
          '''

          PAGE_SCRIPT = '''
              (() => {
                const el = document.getElementById('generated-time');
                if (!el) return;
                const iso = el.getAttribute('data-generated-utc');
                if (!iso) return;
                const dt = new Date(iso);
                if (Number.isNaN(dt.getTime())) return;
                const local = dt.toLocaleString();
                el.textContent += ' (' + local + ' local)';
              })();
          '''

          def make_page(title_text, heading, description, listing, generated_at, generated_at_iso, back_link=None):
              back_html = f'<p class="back"><a href="{html.escape(back_link)}">← Back</a></p>' if back_link else ''
              return f'''<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>{html.escape(title_text)}</title>
            <style>{PAGE_STYLE}</style>
          </head>
          <body>
            <main class="wrap">
              {back_html}
              <h1>{html.escape(heading)}</h1>
              <p>{html.escape(description)}</p>
              <p class="generated" id="generated-time" data-generated-utc="{html.escape(generated_at_iso)}">Generated: {html.escape(generated_at)}</p>
                <ul class="tree">
          {listing}
              </ul>
            </main>
            <script>{PAGE_SCRIPT}</script>
          </body>
          </html>
          '''

          # ── Root index ──────────────────────────────────────────────────────────
          tree = {"_files": [], "_dirs": {}}
          for rel in html_files:
              node = tree
              for folder in rel.parts[:-1]:
                  node = node["_dirs"].setdefault(folder, {"_files": [], "_dirs": {}})

              href = str(rel).replace('\\', '/')
              title = title_for(root / rel)
              node["_files"].append((rel.name, href, title))

          def render_tree(node, indent='      ', path_prefix=''):
              lines = []

              for _name, href, title in sorted(node["_files"], key=lambda item: item[1].lower()):
                  lines.append(
                      f'{indent}<li class="file"><a href="{html.escape(href, quote=True)}">{html.escape(title)}</a></li>'
                  )

              for dirname, child in sorted(node["_dirs"].items(), key=lambda item: item[0].lower()):
                  folder_href = html.escape(f'{path_prefix}{dirname}/index.html', quote=True)
                  lines.append(f'{indent}<li class="folder"><a class="folder-name" href="{folder_href}">{html.escape(dirname)}/</a>')
                  lines.append(f'{indent}  <ul>')
                  lines.extend(render_tree(child, indent + '    ', f'{path_prefix}{dirname}/'))
                  lines.append(f'{indent}  </ul>')
                  lines.append(f'{indent}</li>')

              return lines

          tree_lines = render_tree(tree)
          listing = '\n'.join(tree_lines) if tree_lines else '      <li>No presentations found.</li>'
          generated_at_dt = datetime.now(timezone.utc)
          generated_at = generated_at_dt.strftime('%Y-%m-%d %H:%M:%S UTC')
          generated_at_iso = generated_at_dt.isoformat().replace('+00:00', 'Z')

          root.joinpath('index.html').write_text(
              make_page('Presentation Index', 'Presentation Index',
                        'Auto-generated list of HTML presentations in this repository.',
                        listing, generated_at, generated_at_iso) + '\n',
              encoding='utf-8'
          )
          print(f'Generated root index.html with {len(html_files)} link(s).')

          # ── Per-folder indexes ───────────────────────────────────────────────────
          from collections import defaultdict
          by_folder = defaultdict(list)
          for rel in html_files:
              by_folder[rel.parent].append(rel)

          folder_count = 0
          for folder, files in sorted(by_folder.items(), key=lambda kv: str(kv[0]).lower()):
              if folder == Path('.'):
                  continue  # root already handled above
              items_html = '\n'.join(
                  f'      <li class="file"><a href="{html.escape(f.name, quote=True)}">{html.escape(title_for(root / f))}</a></li>'
                  for f in sorted(files, key=lambda p: p.name.lower())
              )
              folder_listing = items_html if items_html else '      <li>No presentations found.</li>'
              folder_label = str(folder).replace('\\', '/')
              (root / folder / 'index.html').write_text(
                  make_page(
                      f'{folder_label} — Presentations',
                      folder_label,
                      f'HTML presentations in {folder_label}/',
                      folder_listing, generated_at, generated_at_iso,
                      back_link='../index.html'
                  ) + '\n',
                  encoding='utf-8'
              )
              folder_count += 1

          print(f'Generated {folder_count} folder index.html file(s).')
          PY
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
