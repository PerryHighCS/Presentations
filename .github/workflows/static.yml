# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - "CODEOWNERS"
      - ".github/CODEOWNERS"
      - ".agent/**"
      - ".claude/**"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Pre-enable submodule checkout for upcoming SyncDeck-Reveal split.
          # If no submodules exist yet, this is a no-op.
          submodules: recursive
      - name: Stage publishable site
        run: node scripts/stage-site.mjs
      - name: List staged site files
        run: |
          echo "Files that will be published from _site:"
          if [ -d _site ]; then
            find _site -type f -printf '%P\n' | sort
            echo
            echo "Total files: $(find _site -type f | wc -l)"
          else
            echo "_site directory was not created."
            exit 1
          fi
      - name: Generate index.html
        run: node scripts/generate-site-indexes.mjs _site
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
