name: Generate Presentation Index

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - '.github/workflows/generate-presentation-index.yml'

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate index.html
        run: |
          python - <<'PY'
          from pathlib import Path
          import html
          import re

          root = Path('.')

          def is_hidden(path: Path) -> bool:
              return any(part.startswith('.') for part in path.parts)

          def title_for(path: Path) -> str:
              try:
                  text = path.read_text(encoding='utf-8', errors='ignore')
                  match = re.search(r'<title>(.*?)</title>', text, flags=re.IGNORECASE | re.DOTALL)
                  if match:
                      value = re.sub(r'\s+', ' ', match.group(1)).strip()
                      if value:
                          return value
              except Exception:
                  pass
              return path.stem.replace('-', ' ').replace('_', ' ').title()

          html_files = []
          for file_path in root.rglob('*.html'):
              rel = file_path.relative_to(root)
              if rel.name == 'index.html':
                  continue
              if is_hidden(rel):
                  continue
              html_files.append(rel)

          html_files.sort(key=lambda p: str(p).lower())

          rows = []
          for rel in html_files:
              href = str(rel).replace('\\', '/')
              title = title_for(root / rel)
              rows.append(
                  f'      <li><a href="{html.escape(href, quote=True)}">{html.escape(title)}</a>'
                  f' <span class="path">({html.escape(href)})</span></li>'
              )

          listing = '\n'.join(rows) if rows else '      <li>No presentations found.</li>'

          content = f'''<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Presentation Index</title>
            <style>
              :root {{
                color-scheme: dark;
                --bg: #0b1220;
                --card: #111a2e;
                --text: #e5ecff;
                --muted: #9bb0d8;
                --accent: #67d4ff;
                --border: #223050;
              }}
              * {{ box-sizing: border-box; }}
              body {{
                margin: 0;
                font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
                background: var(--bg);
                color: var(--text);
                padding: 32px 18px;
              }}
              .wrap {{
                max-width: 920px;
                margin: 0 auto;
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 24px;
              }}
              h1 {{ margin: 0 0 8px; font-size: 1.7rem; }}
              p {{ margin: 0 0 18px; color: var(--muted); }}
              ul {{ margin: 0; padding-left: 20px; }}
              li {{ margin: 10px 0; line-height: 1.45; }}
              a {{ color: var(--accent); text-decoration: none; }}
              a:hover {{ text-decoration: underline; }}
              .path {{ color: var(--muted); font-size: 0.9em; }}
            </style>
          </head>
          <body>
            <main class="wrap">
              <h1>Presentation Index</h1>
              <p>Auto-generated list of HTML presentations in this repository.</p>
              <ul>
          {listing}
              </ul>
            </main>
          </body>
          </html>
          '''

          root.joinpath('index.html').write_text(content + '\n', encoding='utf-8')
          print(f'Generated index.html with {len(html_files)} link(s).')
          PY

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- index.html; then
            echo "No index changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: regenerate presentation index"
          git push
